{% extends 'base.html' %}

{% block title %}
IELTS Tracker
{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <div class="row align-items-center gy-5">

            <div class="col-lg-5">
                <div class="section-glass p-5 shadow-soft">

                    <div class="section-heading mb-4">
                        <span class="eyebrow">IELTS Tracker</span>
                        <h2 class="section-title">Track your English readiness</h2>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label">Target Score</label>
                            <input type="number"
                                   name="target_score"
                                   class="form-control"
                                   placeholder="7.0"
                                   min="0"
                                   max="9"
                                   step="0.1"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Current Score</label>
                            <input type="number"
                                   name="current_score"
                                   class="form-control"
                                   placeholder="6.0"
                                   min="0"
                                   max="9"
                                   step="0.1"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            Calculate Progress
                        </button>

                    </form>

                </div>
            </div>

            <div class="col-lg-7">

                <div class="section-glass p-5 shadow-soft">

                    <div class="mb-4">
                        <h4>Progress</h4>

                        <div class="progress progress-bar-custom">

                            <div class="progress-bar"
                                 role="progressbar"
                                 style="width:{% if progress %}{{ progress }}{% else %}0{% endif %}%;"
                                 aria-valuenow="{% if progress %}{{ progress }}{% else %}0{% endif %}"
                                 aria-valuemin="0"
                                 aria-valuemax="100">

                            </div>

                        </div>

                    </div>

                    <div class="d-flex justify-content-between align-items-center">

                        <span>Progress</span>

                        {% if progress %}
                            <strong>{{ progress }}%</strong>
                        {% else %}
                            <strong>Enter your scores to see progress</strong>
                        {% endif %}

                    </div>

                </div>

            </div>

        </div>
    </div>
</section>
{% endblock %}
