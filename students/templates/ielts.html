{% extends 'base.html' %}

{% block title %}
IELTS Tracker
{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <div class="row align-items-center gy-5">
            <div class="col-lg-5">
                <div class="section-glass p-5 shadow-soft">
                    <div class="section-heading mb-4"><span class="eyebrow">IELTS Tracker</span><h2 class="section-title">Track your English readiness</h2></div>
                    <form id="ieltsForm">
                        <div class="mb-4">
                            <label class="form-label">Target Score</label>
                            <input id="targetScore" type="number" class="form-control" placeholder="7.0" min="0" max="9" step="0.1" required />
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Current Score</label>
                            <input id="currentScore" type="number" class="form-control" placeholder="6.0" min="0" max="9" step="0.1" required />
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">Calculate Progress</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="section-glass p-5 shadow-soft">
                    <div class="mb-4"><h4>Progress</h4><div class="progress progress-bar-custom"><div id="ieltsProgress" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div></div></div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span>Progress indicator</span>
                        <strong id="ieltsMessage">Enter your scores to see progress</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
